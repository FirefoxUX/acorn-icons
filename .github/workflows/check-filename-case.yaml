name: "Check filename case"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "icons/**"

jobs:
  check:
    runs-on: "ubuntu-latest"
    name: "Check for case-insensitive filename collisions"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect case-insensitive duplicates in icons/
        run: |
          set -euo pipefail
          collisions=$(
            find icons -type f \
              | awk -F/ '{name=$NF; dir=substr($0,1,length($0)-length(name)-1); print dir"\t"tolower(name)"\t"$0}' \
              | sort \
              | awk -F'\t' '{
                  key=$1"\t"$2
                  if (key==prev_key) {
                    print prev_full
                    print $3
                  }
                  prev_key=key
                  prev_full=$3
                }'
          )
          if [ -n "$collisions" ]; then
            echo "Found filenames that collide when case is ignored:"
            echo "$collisions"
            echo ""
            echo "These would conflict on case-insensitive filesystems (macOS, Windows)."
            echo "Rename so each filename is unique within its directory regardless of case."
            exit 1
          fi
          echo "No case-insensitive filename collisions found."
