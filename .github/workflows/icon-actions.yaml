name: "Icon actions"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "icons/**"

jobs:
  checks:
    runs-on: "ubuntu-latest"
    name: "Check and format icons"
    permissions:
      contents: "write"
      pull-requests: "write"
      statuses: "write"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Install dependencies
        working-directory: ./.github/actions
        run: npm ci
      # tsx runs the actions without a compile step, so types are not verified
      # at runtime — gate the workflow on a static typecheck instead.
      - name: Type check actions
        working-directory: ./.github/actions
        run: npm run typecheck
      - name: Update desktop icons
        uses: ./.github/actions/src/desktop-transform
        with:
          files: "icons/desktop/**/*.svg"
      - name: Update mobile svg icons
        uses: ./.github/actions/src/mobile-transform
        with:
          files: "icons/mobile/**/*.svg"
          file_type: "svg"
      - name: Update mobile xml icons
        uses: ./.github/actions/src/mobile-transform
        with:
          files: "icons/mobile/**/*.xml"
          file_type: "xml"
      - name: Commit changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/src/commit-changes

      - name: Post PR feedback
        if: always()
        uses: ./.github/actions/post-feedback
        with:
          marker: "<!-- acorn-icons-bot:icon-actions -->"
          status_context: "acorn-icons / icon validation"
          feedback_path: ${{ runner.temp }}/icon-feedback.json
          outcome: ${{ job.status }}
