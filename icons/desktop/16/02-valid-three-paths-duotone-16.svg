<!-- VALID: more than two paths is fine as long as both channels appear at least once. Here: one context-stroke + two context-fill. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill-opacity="context-fill-opacity">
  <circle fill="context-stroke" cx="8" cy="8" r="8"/>
  <path fill="context-fill" d="M4 4h8v8H4z"/>
  <path fill="context-fill" d="M0 0h2v2H0z"/>
</svg>
